<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="120" rx="12" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="40" x2="400" y2="40" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="80" x2="400" y2="80" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Icon: hexagon with circuit lines -->
  <g transform="translate(24, 20)" filter="url(#glow)">
    <!-- Hexagon -->
    <polygon points="40,0 70,17 70,53 40,70 10,53 10,17" fill="none" stroke="url(#iconGrad)" stroke-width="2.5" opacity="0.9"/>
    <!-- Inner hex -->
    <polygon points="40,12 58,22 58,48 40,58 22,48 22,22" fill="url(#iconGrad)" opacity="0.15"/>
    <!-- Circuit dots -->
    <circle cx="40" cy="35" r="5" fill="url(#iconGrad)" opacity="0.9"/>
    <line x1="40" y1="12" x2="40" y2="30" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.7"/>
    <line x1="40" y1="40" x2="40" y2="58" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.7"/>
    <line x1="22" y1="22" x2="35" y2="32" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.7"/>
    <line x1="58" y1="22" x2="45" y2="32" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.7"/>
    <circle cx="40" cy="12" r="2.5" fill="#6366f1"/>
    <circle cx="22" cy="22" r="2.5" fill="#8b5cf6"/>
    <circle cx="58" cy="22" r="2.5" fill="#06b6d4"/>
  </g>

  <!-- Title -->
  <text x="108" y="52" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" fill="#f8fafc" letter-spacing="-0.5">AI Context</text>
  <text x="108" y="52" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" fill="url(#accentGrad)" letter-spacing="-0.5" opacity="0.15">AI Context</text>

  <!-- Subtitle -->
  <text x="109" y="73" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8" letter-spacing="0.5">MCP Server</text>

  <!-- Accent underline -->
  <rect x="108" y="79" width="160" height="2" rx="1" fill="url(#accentGrad)" opacity="0.6"/>

  <!-- Tagline -->
  <text x="108" y="100" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">Version-pinned docs · Zero hallucinations · 57+ libraries</text>

  <!-- Top-right badge -->
  <rect x="330" y="14" width="56" height="20" rx="10" fill="#6366f1" opacity="0.2"/>
  <text x="358" y="28" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="600" fill="#a5b4fc" text-anchor="middle">v1.0.0</text>
</svg>
